<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใกล้กัน 💕 - Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0F; --card: #13131F; --card2: #1A1A2E;
  --me: #6B9DFF; --partner: #FF6B9D;
  --text: #E8E8F0; --muted: #6B6B8A; --border: rgba(255,255,255,0.08);
  --font-display: 'Prompt', sans-serif; --font-body: 'Inter', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }

/* AUTH SCREEN */
#auth-screen {
  position: fixed; inset: 0; z-index: 999; background: var(--bg);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.auth-box {
  width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 32px 24px; text-align: center;
}
.auth-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--me), var(--partner)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

/* MAIN APP */
#app-screen { display: none; height: 100%; }
#map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.85) saturate(1.1); }

.top-panel {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 12px 16px 0; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.header-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; pointer-events: all;
}
.app-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; background: linear-gradient(135deg, var(--me), var(--partner)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-right { display: flex; align-items: center; gap: 10px; }
.live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4ade80; font-weight: 500; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.profiles-row { display: flex; gap: 8px; pointer-events: all; }
.profile-card {
  flex: 1; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px; padding: 10px 12px;
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.profile-card.me { border-bottom: 3px solid var(--me); }
.profile-card.partner { border-bottom: 3px solid var(--partner); }
.avatar-emoji { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.me .avatar-emoji { background: rgba(107,157,255,0.15); border: 1.5px solid var(--me); }
.partner .avatar-emoji { background: rgba(255,107,157,0.15); border: 1.5px solid var(--partner); }
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-family: var(--font-display); font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.profile-sub { font-size: 10px; color: var(--muted); }

.dist-card {
  background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 8px 16px;
  display: flex; align-items: center; justify-content: center; gap: 6px; pointer-events: all; align-self: center;
}
.dist-value { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; }
.dist-label { font-size: 11px; color: var(--muted); }

/* CONTROLS */
.bottom-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; pointer-events: all; }
.btn {
  height: 42px; border-radius: 999px; border: 1px solid var(--border); background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
  color: var(--text); cursor: pointer; font-family: var(--font-display); font-size: 13px; font-weight: 500; padding: 0 16px;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.btn.primary { background: linear-gradient(135deg, var(--me), var(--partner)); border: none; color: #fff; }
.btn:active { transform: scale(0.95); }

.heart-btn { position: fixed; right: 16px; bottom: 90px; z-index: 10; width: 48px; height: 48px; border-radius: 50%; background: rgba(255,107,157,0.25); border: 1px solid rgba(255,107,157,0.4); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

/* FORMS */
.form-group { margin-bottom: 14px; text-align: left; }
.form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; }
.form-input:focus { border-color: var(--me); }

/* MODAL & TOAST */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 24px 24px 32px; transform: translateY(100%); transition: transform 0.3s ease-out; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 16px; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(19,19,31,0.95); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 13px; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.floating-heart { position: fixed; z-index: 200; pointer-events: none; font-size: 24px; animation: floatUp 2s ease-out forwards; }
@keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-140px) scale(0.5); opacity: 0; } }
</style>
</head>
<body>

<!-- 1. AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">ใกล้กัน 💕</div>
    <div class="auth-subtitle">ระบบระบุตำแหน่งเรียลไทม์คู่รัก</div>
    
    <div class="form-group">
      <label class="form-label">อีเมล</label>
      <input type="email" id="auth-email" class="form-input" placeholder="name@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">รหัสผ่าน</label>
      <input type="password" id="auth-password" class="form-input" placeholder="••••••••">
    </div>
    
    <button class="btn primary" style="width:100%; justify-content:center; margin-top:10px;" onclick="handleAuth('login')">เข้าสู่ระบบ</button>
    <button class="btn" style="width:100%; justify-content:center; margin-top:8px; border:none;" onclick="handleAuth('signup')">ลงทะเบียนสมาชิกใหม่</button>
  </div>
</div>

<!-- 2. MAIN APP SCREEN -->
<div id="app-screen">
  <div id="map"></div>

  <div class="top-panel">
    <div class="header-bar">
      <span class="app-title">ใกล้กัน 💕</span>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
        <button class="btn" style="height:28px; padding:0 10px; font-size:11px;" onclick="handleLogout()">ออกระบบ</button>
      </div>
    </div>

    <div class="profiles-row">
      <div class="profile-card me" onclick="openEditModal()">
        <div class="avatar-emoji" id="me-avatar">😊</div>
        <div class="profile-info">
          <div class="profile-name" id="me-name">กำลังโหลด...</div>
          <div class="profile-sub">ฉัน</div>
        </div>
      </div>

      <div class="profile-card partner" onclick="openConnectModal()">
        <div class="avatar-emoji" id="partner-avatar">🥰</div>
        <div class="profile-info">
          <div class="profile-name" id="partner-name">ยังไม่เชื่อมต่อ</div>
          <div class="profile-sub" id="partner-status">รอแฟนเชื่อมต่อ...</div>
        </div>
      </div>
    </div>

    <div class="dist-card" id="dist-card" style="display:none;">
      <span class="dist-value" id="dist-value">--</span>
      <span class="dist-label">ห่างจากแฟน</span>
    </div>
  </div>

  <div class="heart-btn" onclick="sendHeart()">💌</div>

  <div class="bottom-bar">
    <button class="btn" onclick="centerMap()">🎯 ดูทั้งคู่</button>
    <button class="btn primary" onclick="openConnectModal()">🔗 เชื่อมต่อแฟน</button>
    <button class="btn" onclick="locateMe()">📍 ตำแหน่งฉัน</button>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ แก้ไขโปรไฟล์ของคุณ</div>
    <div class="form-group">
      <label class="form-label">ชื่อของคุณ</label>
      <input class="form-input" id="edit-name-input" type="text">
    </div>
    <div class="modal-actions" style="display:flex; gap:8px; margin-top:16px;">
      <button class="btn" style="flex:1; justify-content:center;" onclick="closeModal('edit-modal')">ยกเลิก</button>
      <button class="btn primary" style="flex:1; justify-content:center;" onclick="saveProfile()">บันทึก</button>
    </div>
  </div>
</div>

<!-- CONNECT MODAL -->
<div class="modal-overlay" id="connect-modal">
  <div class="modal">
    <div class="modal-title">🔗 เชื่อมต่อกับหวานใจ</div>
    <div class="form-group">
      <label class="form-label">คีย์ส่วนตัวของคุณ (ส่งให้อีกฝ่าย)</label>
      <input class="form-input" id="my-connect-key" type="text" readonly style="background:var(--card2); color:var(--me); font-family:monospace; font-weight:bold;">
    </div>
    <div class="form-group">
      <label class="form-label">ใส่คีย์ส่วนตัวของแฟน</label>
      <input class="form-input" id="partner-key-input" type="text" placeholder="วางคีย์ส่วนตัวของแฟนที่นี่...">
    </div>
    <div class="modal-actions" style="display:flex; gap:8px; margin-top:16px;">
      <button class="btn" style="flex:1; justify-content:center;" onclick="closeModal('connect-modal')">ปิด</button>
      <button class="btn primary" style="flex:1; justify-content:center;" onclick="saveConnection()">เชื่อมต่อ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE CONFIG ───────────────────────────────────────
const SUPABASE_URL = 'https://ccrvtcmcayvjxzglrsae.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjcnZ0Y21jYXl2anh6Z2xyc2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODY0MDMsImV4cCI6MjA5Nzg2MjQwM30.P2aeSJni7XDgEgq1ITcrDaUs7az14uxA-6h6lV_jBm0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let map, meMarker, partnerMarker, polyline;
let currentUser = null, myProfileName = "ฉัน", partnerUserId = null;
let myPos = null, partnerPos = null, realtimeChannel = null;

// ── 1. AUTH LOGIC ────────────────────────────────────────
async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    setupApp(data.session.user);
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
}

async function handleAuth(type) {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value.trim();
  if(!email || !password) return showToast("⚠️ กรุณากรอกข้อมูลให้ครบถ้วน");

  let result;
  if (type === 'signup') {
    result = await sb.auth.signUp({ email, password });
    if(!result.error) showToast("🎉 สมัครสมาชิกสำเร็จ! ระบบกำลังล็อกอิน...");
  } else {
    result = await sb.auth.signInWithPassword({ email, password });
  }

  if (result.error) {
    showToast("❌ ข้อผิดพลาด: " + result.error.message);
  } else if (result.data.user) {
    setupApp(result.data.user);
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  location.reload();
}

// ── 2. APP INITIALIZATION ────────────────────────────────
function setupApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  
  myProfileName = user.email.split('@')[0];
  document.getElementById('me-name').textContent = myProfileName;
  document.getElementById('my-connect-key').value = user.id;

  // โหลดค่าความจำเก่าจาก LocalStorage (ถ้ามี)
  partnerUserId = localStorage.getItem('partner_id');

  initMap();
  startTracking();
  initRealtime();
}

// ── 3. MAP & GEOLOCATION ─────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
  map.setView([13.7563, 100.5018], 10);
}

function startTracking() {
  if (!navigator.geolocation) return showToast("❌ อุปกรณ์นี้ไม่รองรับ GPS");
  
  navigator.geolocation.watchPosition(pos => {
    myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    updateMyMarker();
    broadcastData({ type: 'pos', lat: myPos.lat, lng: myPos.lng, name: myProfileName });
  }, err => {
    showToast("⚠️ ไม่สามารถเข้าถึงพิกัดได้ โปรดเปิดสิทธิ์ความแม่นยำสูง");
  }, { enableHighAccuracy: true, maximumAge: 2000 });
}

function updateMyMarker() {
  if (!myPos) return;
  const ll = [myPos.lat, myPos.lng];
  if (!meMarker) {
    meMarker = L.marker(ll, { icon: createMarkerIcon('😊', '#6B9DFF') }).addTo(map);
    map.setView(ll, 14);
  } else {
    meMarker.setLatLng(ll);
  }
  updateLineAndDistance();
}

function updatePartnerMarker(lat, lng, name) {
  partnerPos = { lat, lng };
  document.getElementById('partner-name').textContent = name || "แฟน";
  document.getElementById('partner-status').textContent = "ออนไลน์เรียลไทม์";
  
  const ll = [lat, lng];
  if (!partnerMarker) {
    partnerMarker = L.marker(ll, { icon: createMarkerIcon('🥰', '#FF6B9D') }).addTo(map);
  } else {
    partnerMarker.setLatLng(ll);
  }
  updateLineAndDistance();
}

function createMarkerIcon(emoji, color) {
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;width:44px;height:52px">
      <div style="width:44px;height:44px;border-radius:50%;background:${color}22;border:3px solid ${color};display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px ${color}44;">${emoji}</div>
      <div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid ${color};"></div>
    </div>`,
    iconSize:[44,52], iconAnchor:[22,52]
  });
}

function updateLineAndDistance() {
  if (!myPos || !partnerPos) return;
  const pts = [[myPos.lat, myPos.lng], [partnerPos.lat, partnerPos.lng]];
  if (!polyline) polyline = L.polyline(pts, { color: 'white', weight: 2, opacity: 0.5, dashArray: '4,6' }).addTo(map);
  else polyline.setLatLngs(pts);

  // คำนวณระยะทาง
  const R = 6371; 
  const dLat = (partnerPos.lat - myPos.lat) * Math.PI / 180;
  const dLng = (partnerPos.lng - myPos.lng) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(myPos.lat * Math.PI / 180) * Math.cos(partnerPos.lat * Math.PI / 180) * Math.sin(dLng/2) * Math.sin(dLng/2);
  const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  const card = document.getElementById('dist-card');
  const val = document.getElementById('dist-value');
  card.style.display = 'flex';
  val.textContent = d < 1 ? `${Math.round(d * 1000)} เมตร` : `${d.toFixed(2)} กม.`;
}

// ── 4. REALTIME SYSTEM (ROOM ID BASED ON USER IDS) ────────
function initRealtime() {
  if (!partnerUserId) return;
  
  // สร้าง Room ID ที่เป็นเอกลักษณ์ร่วมกันโดยเรียงจากอักษรน้อยไปมาก
  const roomId = [currentUser.id, partnerUserId].sort().join('_');
  
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  
  realtimeChannel = sb.channel(`track:${roomId}`)
    .on('broadcast', { event: 'share' }, ({ payload }) => {
      if (payload.sender === currentUser.id) return;
      if (payload.type === 'pos') {
        updatePartnerMarker(payload.lat, payload.lng, payload.name);
      } else if (payload.type === 'heart') {
        spawnHeartEffect();
        showToast(`💖 ${payload.name} ส่งความคิดถึงมาให้คุณ!`);
      }
    })
    .subscribe(status => {
      if(status === 'SUBSCRIBED') {
        setTimeout(() => {
          if(myPos) broadcastData({ type: 'pos', lat: myPos.lat, lng: myPos.lng, name: myProfileName });
        }, 1000);
      }
    });
}

function broadcastData(data) {
  if (!realtimeChannel) return;
  realtimeChannel.send({
    type: 'broadcast',
    event: 'share',
    payload: { ...data, sender: currentUser.id }
  });
}

function sendHeart() {
  if(!partnerUserId) return showToast("🔗 โปรดเชื่อมต่อกับแฟนก่อนส่งหัวใจ");
  broadcastData({ type: 'heart', name: myProfileName });
  spawnHeartEffect();
  showToast("💕 ส่งหัวใจเรียบร้อย!");
}

// ── 5. UI CONTROLS & MODALS ──────────────────────────────
function centerMap() {
  if (!myPos) return;
  if (partnerPos) map.fitBounds([[myPos.lat, myPos.lng], [partnerPos.lat, partnerPos.lng]], { padding: [60, 60] });
  else map.setView([myPos.lat, myPos.lng], 15);
}
function locateMe() { if (myPos) map.setView([myPos.lat, myPos.lng], 16); }

function openEditModal() {
  document.getElementById('edit-name-input').value = myProfileName;
  document.getElementById('edit-modal').classList.add('open');
}
function saveProfile() {
  const name = document.getElementById('edit-name-input').value.trim();
  if(name) {
    myProfileName = name;
    document.getElementById('me-name').textContent = name;
    if(myPos) broadcastData({ type: 'pos', lat: myPos.lat, lng: myPos.lng, name: myProfileName });
  }
  closeModal('edit-modal');
}

function openConnectModal() {
  document.getElementById('partner-key-input').value = partnerUserId || "";
  document.getElementById('connect-modal').classList.add('open');
}
function saveConnection() {
  const key = document.getElementById('partner-key-input').value.trim();
  if(!key) return showToast("⚠️ กรุณาใส่คีย์ของแฟน");
  if(key === currentUser.id) return showToast("❌ ไม่สามารถใส่คีย์ของตัวเองได้");
  
  partnerUserId = key;
  localStorage.setItem('partner_id', key);
  showToast("✅ บันทึกการเชื่อมต่อ! กำลังดึงสัญญาณ...");
  closeModal('connect-modal');
  initRealtime();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function spawnHeartEffect() {
  const h = document.createElement('div'); h.className = 'floating-heart'; h.textContent = '💖';
  h.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 60) + 'px';
  h.style.top = (window.innerHeight * 0.7) + 'px';
  document.body.appendChild(h); setTimeout(() => h.remove(), 2000);
}

// ตรวจสอบสถานะการล็อคอินเริ่มต้น
checkSession();
</script>
</body>
</html>
